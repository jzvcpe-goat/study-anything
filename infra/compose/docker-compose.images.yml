# Optional override for using published GHCR images instead of local builds.
# Usage:
#   STUDY_ANYTHING_API_IMAGE=ghcr.io/jzvcpe-goat/study-anything/api:v0.2.5-alpha \
#   STUDY_ANYTHING_WEB_IMAGE=ghcr.io/jzvcpe-goat/study-anything/web:v0.2.5-alpha \
#   docker compose --env-file .env -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.images.yml up -d

services:
  api:
    image: ${STUDY_ANYTHING_API_IMAGE}
    build: !reset null

  web:
    image: ${STUDY_ANYTHING_WEB_IMAGE}
    build: !reset null

  mock-http-agent:
    image: ${STUDY_ANYTHING_API_IMAGE}
    build: !reset null
