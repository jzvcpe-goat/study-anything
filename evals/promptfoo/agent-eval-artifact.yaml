description: Study Anything Agent eval artifact contract gate

prompts:
  - "{{sessionId}}"

providers:
  - id: https
    config:
      url: "{{apiBase}}/v1/sessions/{{sessionId}}/agent-eval/artifact"
      method: GET
      headers:
        Content-Type: application/json
      transformResponse: json

tests:
  - assert:
      - type: is-json
        value:
          type: object
          required:
            - schema_version
            - status
            - native_gates
            - adapter_strategy
            - trajectory
            - privacy
          properties:
            schema_version:
              const: agent-eval-artifact-v1
            status:
              const: ready_for_external_eval
            native_gates:
              type: array
              minItems: 4
            adapter_strategy:
              type: array
              minItems: 4
            trajectory:
              type: array
              minItems: 5
            privacy:
              type: object
              properties:
                raw_source_text_included:
                  const: false
                raw_answers_included:
                  const: false
                raw_feedback_included:
                  const: false
                agent_endpoints_included:
                  const: false
                raw_agent_metadata_included:
                  const: false
      - type: contains-all
        value:
          - '"gate_id":"agent_invocation_coverage"'
          - '"gate_id":"source_reference_present"'
          - '"gate_id":"excerpt_hash_present"'
          - '"gate_id":"privacy_redaction"'
          - '"status":"pass"'
          - '"adapter_id":"promptfoo"'
          - '"adapter_id":"deepeval"'
          - '"adapter_id":"langchain-agentevals"'
          - '"adapter_id":"ragas"'
          - '"task_type":"teach.overview"'
          - '"task_type":"teach.glossary"'
          - '"task_type":"quiz.generate"'
          - '"task_type":"answer.grade"'
          - '"task_type":"insight.synthesize"'
          - '"raw_source_text_included":false'
          - '"raw_answers_included":false'
          - '"raw_feedback_included":false'
          - '"agent_endpoints_included":false'
          - '"raw_agent_metadata_included":false'
