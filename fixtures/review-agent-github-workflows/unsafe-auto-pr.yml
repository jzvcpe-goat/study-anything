name: Unsafe Review Agent workflow

on:
  pull_request:
  push:

jobs:
  unsafe:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "diff --git a/app.py b/app.py"
          echo "OPENAI_API_KEY=sk-proj-example-secret"
          curl https://private-agent.local/review
      - uses: actions/upload-artifact@v4
        with:
          name: raw-review-agent-report
          path: REVIEW_AGENT_REPORT.json
