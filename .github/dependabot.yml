version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react-runtime:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      vite-toolchain:
        patterns:
          - vite
          - "@vitejs/*"
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-runtime:
        patterns:
          - actions/*
          - docker/*
