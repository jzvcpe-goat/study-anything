name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: codeql (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          languages: python
          queries: security-extended
      - name: Analyze Python
        uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          category: /language:python

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Reject vulnerable dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  container-policy:
    name: container policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install locked policy dependencies
        run: python -m pip install --require-hashes -r requirements/locked-policy.txt
      - name: Verify container and workflow security policy
        run: python scripts/verify_container_security.py --check
      - name: Verify time-bounded dependency risk acceptances
        run: python scripts/verify_dependency_risk_acceptance.py --check
      - name: Verify Agent endpoint allowlist policy
        run: python scripts/verify_agent_endpoint_policy.py --check
      - name: Verify hosted identity and tenant isolation
        run: python scripts/verify_hosted_identity_tenancy.py --check
      - name: Verify independent security audit preparation pack
        run: |
          python scripts/generate_external_security_audit_pack.py --check
          python scripts/verify_external_security_audit_pack.py --check
