name: reliability-soak

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      samples:
        description: Number of real-time health samples per mode
        required: true
        default: "721"
      interval_seconds:
        description: Seconds between health samples
        required: true
        default: "10"
      fault_after_seconds:
        description: Seconds before the controlled API interruption
        required: true
        default: "600"
      fault_duration_seconds:
        description: Seconds to keep the API stopped
        required: true
        default: "45"
      tag:
        description: Published API image tag
        required: true
        default: main
      min_success_ratio:
        description: Minimum successful-probe ratio; lowering it makes a run diagnostic only
        required: true
        default: "0.99"
      max_consecutive_failures:
        description: Maximum consecutive failed probes; raising it makes a run diagnostic only
        required: true
        default: "8"
      evidence_run_id:
        description: Completed reliability-soak run ID to index without rerunning the two mode jobs
        required: false
        default: ""

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  reliability-soak:
    if: ${{ inputs.evidence_run_id == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        mode: [source-build, published-image]
    env:
      SAMPLES: ${{ inputs.samples || '721' }}
      INTERVAL_SECONDS: ${{ inputs.interval_seconds || '10' }}
      FAULT_AFTER_SECONDS: ${{ inputs.fault_after_seconds || '600' }}
      FAULT_DURATION_SECONDS: ${{ inputs.fault_duration_seconds || '45' }}
      IMAGE_TAG: ${{ inputs.tag || 'main' }}
      MIN_SUCCESS_RATIO: ${{ inputs.min_success_ratio || '0.99' }}
      MAX_CONSECUTIVE_FAILURES: ${{ inputs.max_consecutive_failures || '8' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Compute published image name
        id: image
        run: |
          repo="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${repo}/api" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR for published-image verification
        if: matrix.mode == 'published-image'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run real-time restart and recovery matrix
        run: |
          python scripts/self_host_reliability_matrix.py \
            --mode "${{ matrix.mode }}" \
            --samples "$SAMPLES" \
            --interval-seconds "$INTERVAL_SECONDS" \
            --fault-after-seconds "$FAULT_AFTER_SECONDS" \
            --fault-duration-seconds "$FAULT_DURATION_SECONDS" \
            --min-success-ratio "$MIN_SUCCESS_RATIO" \
            --max-consecutive-failures "$MAX_CONSECUTIVE_FAILURES" \
            --tag "$IMAGE_TAG" \
            --api-image "${{ steps.image.outputs.name }}:$IMAGE_TAG" \
            --output "${RUNNER_TEMP}/study-anything-${{ matrix.mode }}-reliability.json"
      - name: Upload metadata-only reliability receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reliability-${{ matrix.mode }}-${{ github.run_id }}
          path: ${{ runner.temp }}/study-anything-${{ matrix.mode }}-reliability.json
          if-no-files-found: error
          retention-days: 14

  reliability-index:
    if: ${{ always() && (needs.reliability-soak.result != 'skipped' || inputs.evidence_run_id != '') }}
    needs: reliability-soak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve evidence source
        id: evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_RUN_ID: ${{ inputs.evidence_run_id }}
        run: |
          set -euo pipefail
          if [[ -z "$REQUESTED_RUN_ID" ]]; then
            run_id="${{ github.run_id }}"
            head_sha="${{ github.sha }}"
            event="${{ github.event_name }}"
          else
            [[ "$REQUESTED_RUN_ID" =~ ^[1-9][0-9]*$ ]] || {
              echo "evidence_run_id must be a positive numeric GitHub run ID" >&2
              exit 1
            }
            metadata="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${REQUESTED_RUN_ID}" \
              --jq '[.id, .head_sha, .event, .path, .status] | @tsv')"
            IFS=$'\t' read -r run_id head_sha event workflow_path run_status <<< "$metadata"
            [[ "$run_id" == "$REQUESTED_RUN_ID" ]]
            [[ "$workflow_path" == ".github/workflows/reliability-soak.yml" ]] || {
              echo "evidence run belongs to a different workflow" >&2
              exit 1
            }
            [[ "$run_status" == "completed" ]] || {
              echo "evidence run must be completed before index replay" >&2
              exit 1
            }
          fi
          [[ "$head_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$event" =~ ^[A-Za-z0-9_]+$ ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "event=$event" >> "$GITHUB_OUTPUT"
      - name: Download metadata-only mode receipts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: reliability-*-${{ steps.evidence.outputs.run_id }}
          path: ${{ runner.temp }}/reliability-receipts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.evidence.outputs.run_id }}
      - name: Build metadata-only reliability index
        run: |
          python scripts/reliability_evidence_index.py \
            --run-id "${{ steps.evidence.outputs.run_id }}" \
            --event "${{ steps.evidence.outputs.event }}" \
            --head-sha "${{ steps.evidence.outputs.head_sha }}" \
            --source-receipt "${RUNNER_TEMP}/reliability-receipts/study-anything-source-build-reliability.json" \
            --published-receipt "${RUNNER_TEMP}/reliability-receipts/study-anything-published-image-reliability.json" \
            --output "${RUNNER_TEMP}/self-host-reliability-index.json"
      - name: Upload metadata-only reliability index
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reliability-index-${{ steps.evidence.outputs.run_id }}
          path: ${{ runner.temp }}/self-host-reliability-index.json
          if-no-files-found: error
          retention-days: 90
